{% extends "base.html" %}
{% block title %}Create Account — Hycroe{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div style="width:100%;max-width:380px;">

        <div style="text-align:center;margin-bottom:28px;">
            <div style="display:inline-flex;align-items:center;gap:9px;margin-bottom:14px;">
                <div style="width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
                        <rect x="1" y="1" width="6" height="6" rx="1.5" fill="white" opacity=".9"/>
                        <rect x="9" y="1" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
                        <rect x="1" y="9" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
                        <rect x="9" y="9" width="6" height="6" rx="1.5" fill="white" opacity=".3"/>
                    </svg>
                </div>
                <div style="text-align:left;">
                    <div style="font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.4px;">Hycroe</div>
                    <div class="mono" style="font-size:10px;color:var(--text-3);letter-spacing:0.05em;">Node Panel</div>
                </div>
            </div>
            <p style="font-size:13px;color:var(--text-3);">Create an account to get started.</p>
        </div>

        <div class="card" style="padding:24px;">
            <div style="font-size:14.5px;font-weight:700;color:var(--text);margin-bottom:18px;letter-spacing:-0.2px;">Create Account</div>

            {% if error %}
            <div class="alert alert-error" style="margin-bottom:14px;">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px;"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
                {{ error }}
            </div>
            {% endif %}

            <form action="/register" method="post" style="display:flex;flex-direction:column;gap:12px;">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input name="username" class="form-input" placeholder="your-username" required autofocus autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label">Email <span class="text-muted">(optional)</span></label>
                    <input name="email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input name="password" type="password" class="form-input" placeholder="••••••••" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input name="confirm_password" type="password" class="form-input" placeholder="••••••••" required autocomplete="new-password">
                </div>
                {% if invite_only %}
                <div class="form-group">
                    <label class="form-label">Invite Code</label>
                    <input name="invite_code" class="form-input" placeholder="xxxx-xxxx-xxxx" required>
                </div>
                {% endif %}
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" style="justify-content:center;padding:9px;margin-top:2px;">Create Account</button>
            </form>
        </div>

        <p style="text-align:center;font-size:12.5px;color:var(--text-3);margin-top:16px;">
            Already have an account? <a href="/login" style="color:var(--blue-2);font-weight:600;">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
